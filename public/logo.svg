<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Entire icon rotation -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 30 30" 
      to="360 30 30" 
      dur="12s" 
      repeatCount="indefinite"/>

    <!-- Animated lines -->
    <g stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round">

      <line x1="30" y1="30" x2="18" y2="18"
            stroke-dasharray="20"
            stroke-dashoffset="20">
        <animate attributeName="stroke-dashoffset"
                 from="20" to="0"
                 dur="1.2s"
                 repeatCount="indefinite"/>
      </line>

      <line x1="30" y1="30" x2="42" y2="18"
            stroke-dasharray="20"
            stroke-dashoffset="20">
        <animate attributeName="stroke-dashoffset"
                 from="20" to="0"
                 dur="1.2s"
                 begin="0.2s"
                 repeatCount="indefinite"/>
      </line>

      <line x1="30" y1="30" x2="18" y2="42"
            stroke-dasharray="20"
            stroke-dashoffset="20">
        <animate attributeName="stroke-dashoffset"
                 from="20" to="0"
                 dur="1.2s"
                 begin="0.4s"
                 repeatCount="indefinite"/>
      </line>

      <line x1="30" y1="30" x2="42" y2="42"
            stroke-dasharray="20"
            stroke-dashoffset="20">
        <animate attributeName="stroke-dashoffset"
                 from="20" to="0"
                 dur="1.2s"
                 begin="0.6s"
                 repeatCount="indefinite"/>
      </line>

    </g>

    <!-- Outer nodes -->
    <circle cx="18" cy="18" r="3" fill="url(#grad1)"/>
    <circle cx="42" cy="18" r="3" fill="url(#grad1)"/>
    <circle cx="18" cy="42" r="3" fill="url(#grad1)"/>
    <circle cx="42" cy="42" r="3" fill="url(#grad1)"/>

    <!-- Center node (rotating + pulse) -->
    <g>
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        from="0 30 30" 
        to="360 30 30" 
        dur="3s" 
        repeatCount="indefinite"/>

      <circle cx="30" cy="30" r="5" fill="url(#grad1)">
        <animate attributeName="r"
                 values="5;6;5"
                 dur="1.5s"
                 repeatCount="indefinite"/>
      </circle>
    </g>

  </g>
</svg>